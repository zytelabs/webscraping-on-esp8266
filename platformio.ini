; ── Build environments ───────────────────────────────────────────────────────
;
;   d1_mini_example — START HERE: minimal scraper for books.toscrape.com
;   d1_mini_serial  — Weather monitor, serial output only (no display hardware)
;   d1_mini_tft     — Weather monitor, ST7735 128×160 TFT display
;
;   build_src_filter selects which src/ subfolder each environment compiles.
;
; Build:   pio run -e d1_mini_example
; Flash:   pio run -e d1_mini_example --target upload
; Monitor: pio device monitor
;
; IMPORTANT: Set upload_port / monitor_port below to match your system.
;   macOS/Linux : /dev/tty.usbserial-XXXX  or  /dev/ttyUSB0
;   Windows     : COM3  (or whichever COMx Device Manager shows)

[env:d1_mini_tft]
platform = espressif8266
board = d1_mini
framework = arduino
upload_port = /dev/tty.usbserial-XXXX
upload_speed = 115200
monitor_port = /dev/tty.usbserial-XXXX
monitor_speed = 115200
build_src_filter = -<*> +<tft_display/*>
lib_deps =
    adafruit/Adafruit GFX Library
    adafruit/Adafruit ST7735 and ST7789 Library

[env:d1_mini_example]
platform = espressif8266
board = d1_mini
framework = arduino
upload_port = /dev/tty.usbserial-XXXX
upload_speed = 115200
monitor_port = /dev/tty.usbserial-XXXX
monitor_speed = 115200
build_src_filter = -<*> +<scraper_example/*>

[env:d1_mini_serial]
platform = espressif8266
board = d1_mini
framework = arduino
upload_port = /dev/tty.usbserial-XXXX
upload_speed = 115200
monitor_port = /dev/tty.usbserial-XXXX
monitor_speed = 115200
build_src_filter = -<*> +<serial_monitor/*>
